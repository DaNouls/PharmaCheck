<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PharmaCheck — InsudPharma</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- ══════════════ HEADER ══════════════ -->
<header>
  <div class="logo-wrap">
    <img class="logo-img" src="https://www.insudpharma.com/wp-content/themes/insudpharma/images/Logo.png" alt="Insud Pharma" />
  </div>
  <div class="header-divider"></div>
  <span class="header-title">PharmaCheck</span>
  <div class="lang-toggle" id="lang-toggle">
    <button class="lang-btn active" id="lang-es" onclick="setLang('es')">ES</button>
    <button class="lang-btn" id="lang-en" onclick="setLang('en')">EN</button>
  </div>
</header>

<!-- ══════════════ MAIN ══════════════ -->
<main>
  <!-- Initial Screen -->
  <div id="initial-screen">
    <div class="hero">
      <h1 id="hero-title">Evaluación de medicamentos</h1>
      <p id="hero-sub">Consulta la ficha técnica de cualquier fármaco o analiza su compatibilidad con un paciente en segundos.</p>
    </div>

    <div id="search-area">
      <div class="input-row" id="input-row">
        <!-- Med input -->
        <div class="input-group has-label" id="med-group">
          <label>💊 Medicamento</label>
          <input type="text" id="med-input" placeholder="Nombre del medicamento" autocomplete="off"/>
        </div>

        <!-- Patient input (hidden by default) -->
        <div class="patient-input-wrap" id="patient-wrap">
          <div class="input-group has-label">
            <label>🧑‍⚕️ Información del paciente</label>
            <textarea id="patient-input" placeholder="síntomas, receta, enfermedad; peso, altura, embarazo, alergias…"></textarea>
          </div>
        </div>

        <!-- Toggle -->
        <div class="toggle-wrap">
          <div class="toggle-label">Concordancia</div>
          <button id="toggle-btn" title="Activar modo Concordancia de medicamento" aria-pressed="false">
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
              <polyline points="3,9 7,13 15,5" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
        </div>
      </div>

      <div class="error-box" id="error-box">Por favor ingresa el nombre de un medicamento.</div>
      <div class="api-error-banner" id="api-error-banner"></div>

      <button id="action-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14,2 14,8 20,8"/>
        </svg>
        Ficha de medicamento
      </button>
    </div>
  </div>

  <!-- Result Section -->
  <div id="result-section"></div>
</main>

<div class="ai-counter" id="ai-counter"></div>
<script src="app.js"></script>
</body>
</html>
