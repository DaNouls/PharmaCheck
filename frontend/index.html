<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PharmaCheck — InsudPharma</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- ══════════════ HEADER ══════════════ -->
<header>
  <div class="logo-wrap">
    <img class="logo-svg" src="https://www.insudpharma.com/wp-content/themes/insudpharma/images/Logo.png" alt="InsudPharma" />
  </div>
  <div class="header-divider"></div>
  <div class="pharmacheck-brand">
    <img class="pharmacheck-icon" src="pharmacheck-icon.svg" alt="" />
    <span class="pharmacheck-text"><span class="pc-pharma">Pharma</span><span class="pc-check">Check</span></span>
  </div>
  <div class="header-actions">
    <button id="theme-btn" class="theme-btn" title="Cambiar tema" aria-label="Toggle theme">☀️</button>
    <div class="lang-selector" id="lang-selector">
      <button class="lang-globe-btn" id="lang-globe-btn" title="Language / Idioma" aria-label="Select language">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--blue)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <ellipse cx="12" cy="12" rx="4.5" ry="10"/>
          <line x1="2"    y1="12" x2="22"   y2="12"/>
          <line x1="3.34" y1="7"  x2="20.66" y2="7"/>
          <line x1="3.34" y1="17" x2="20.66" y2="17"/>
        </svg>
      </button>
      <div class="lang-dropdown" id="lang-dropdown">
        <button class="lang-option" data-lang="es"><img class="lang-flag" src="https://flagcdn.com/20x15/es.png" alt=""> Español</button>
        <button class="lang-option" data-lang="ca"><img class="lang-flag" src="https://upload.wikimedia.org/wikipedia/commons/thumb/c/ce/Flag_of_Catalonia.svg/20px-Flag_of_Catalonia.svg.png" alt=""> Català</button>
        <button class="lang-option" data-lang="pt"><img class="lang-flag" src="https://flagcdn.com/20x15/pt.png" alt=""> Português</button>
        <button class="lang-option" data-lang="en"><img class="lang-flag" src="https://flagcdn.com/20x15/gb.png" alt=""> English</button>
        <button class="lang-option" data-lang="fr"><img class="lang-flag" src="https://flagcdn.com/20x15/fr.png" alt=""> Français</button>
        <button class="lang-option" data-lang="it"><img class="lang-flag" src="https://flagcdn.com/20x15/it.png" alt=""> Italiano</button>
        <button class="lang-option" data-lang="de"><img class="lang-flag" src="https://flagcdn.com/20x15/de.png" alt=""> Deutsch</button>
        <button class="lang-option" data-lang="no"><img class="lang-flag" src="https://flagcdn.com/20x15/no.png" alt=""> Norsk</button>
        <button class="lang-option" data-lang="ro"><img class="lang-flag" src="https://flagcdn.com/20x15/ro.png" alt=""> Română</button>
      </div>
    </div>
  </div>
</header>

<!-- ══════════════ MAIN ══════════════ -->
<main>
  <!-- Initial Screen -->
  <div id="initial-screen">
    <div class="hero">
      <h1 data-i18n="hero_title">Evaluación de medicamentos</h1>
      <p data-i18n="hero_sub">Consulta la ficha técnica de cualquier fármaco o analiza su compatibilidad con un paciente en segundos.</p>
    </div>

    <div id="search-area">
      <div class="input-row" id="input-row">
        <!-- Med input -->
        <div class="input-group has-label" id="med-group">
          <label data-i18n="label_med">💊 Medicamento</label>
          <input type="text" id="med-input" data-i18n-placeholder="ph_med" placeholder="Nombre del medicamento" autocomplete="off"/>
        </div>

        <!-- Patient input (hidden by default) -->
        <div class="patient-input-wrap" id="patient-wrap">
          <div class="input-group has-label">
            <label data-i18n="label_patient">🧑‍⚕️ Información del paciente</label>
            <textarea id="patient-input" data-i18n-placeholder="ph_patient" placeholder="síntomas, condiciones, edad, embarazo, alergias…"></textarea>
          </div>
        </div>

        <!-- Toggle -->
        <div class="toggle-wrap">
          <div class="toggle-label"><span id="toggle-label-text" data-i18n="toggle_label">Concordancia</span></div>
          <button id="toggle-btn" title="Activar modo Concordancia de medicamento" aria-pressed="false">
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
              <polyline points="3,9 7,13 15,5" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
        </div>
      </div>

      <div class="error-box" id="error-box">Por favor ingresa el nombre de un medicamento.</div>
      <div class="api-error-banner" id="api-error-banner"></div>

      <button id="action-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14,2 14,8 20,8"/>
        </svg>
        Ficha de medicamento
      </button>
    </div>
  </div>

  <!-- Result Section -->
  <div id="result-section"></div>
</main>

<div class="ai-counter" id="ai-counter">
  <span id="ai-label">✨ IA</span>
  <span class="ai-count" id="ai-count">20</span>
  <span style="color:var(--border)">/ 20</span>
  <div class="ai-bar"><div class="ai-bar-fill" id="ai-bar-fill"></div></div>
</div>

<div id="retry-notif"></div>
<script src="app.js"></script>
</body>
</html>
