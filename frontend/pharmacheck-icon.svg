<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 110 120" width="38" height="42">
  <defs>
    <linearGradient id="pc-teal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d4c0"/>
      <stop offset="100%" stop-color="#0099d8"/>
    </linearGradient>
    <linearGradient id="pc-navy" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0080cc"/>
      <stop offset="100%" stop-color="#1a2d6a"/>
    </linearGradient>
  </defs>

  <!-- Molécula: nodos + líneas (arriba izquierda) -->
  <line x1="14" y1="32" x2="30" y2="44" stroke="#00c4b4" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <line x1="14" y1="32" x2="8"  y2="50" stroke="#0090cc" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <line x1="30" y1="44" x2="48" y2="48" stroke="#0090cc" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
  <circle cx="14" cy="32" r="6"   fill="#00c8b8"/>
  <circle cx="30" cy="44" r="4.5" fill="#0094d0" opacity="0.8"/>
  <circle cx="8"  cy="50" r="3.5" fill="#1a4a90" opacity="0.65"/>

  <!-- Círculo teal grande (arco superior del P) -->
  <circle cx="65" cy="52" r="40" fill="url(#pc-teal)"/>

  <!-- Círculo navy (base / pie del P) -->
  <circle cx="52" cy="84" r="30" fill="url(#pc-navy)"/>

  <!-- Checkmark blanco -->
  <polyline points="48,56 62,72 84,40"
    stroke="white" stroke-width="9"
    fill="none" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
