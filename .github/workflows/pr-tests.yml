name: PR Tests

on:
  pull_request:
    branches: [main]

permissions:
  pull-requests: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install fastapi uvicorn httpx pytest pytest-asyncio anyio pydantic pytest-timeout deep-translator

      - name: Run unit tests
        id: unit
        run: |
          set +e
          python3 -m pytest backend/tests/test_main.py -v --tb=short 2>&1 | tee unit_output.txt
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"

      - name: Run e2e tests
        id: e2e
        run: |
          set +e
          python3 -m pytest backend/tests/test_e2e.py -v --tb=short 2>&1 | tee e2e_output.txt
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"

      - name: Run integration tests
        id: integration
        continue-on-error: true   # red externa puede fallar en CI sin bloquear merge
        run: |
          set +e
          python3 -m pytest backend/tests/test_integration.py -v --tb=short --timeout=15 2>&1 | tee integration_output.txt
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"

      - name: Post PR comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            function parseOutput(file) {
              let text = '';
              try { text = fs.readFileSync(file, 'utf8'); } catch { return { passed: 0, failed: 0, errors: 0, lines: '' }; }
              const passed = (text.match(/\bPASSED\b/g) || []).length;
              const failed = (text.match(/\bFAILED\b/g) || []).length;
              const errors = (text.match(/\bERROR\b/g) || []).length;
              const lines = text.split('\n')
                .filter(l => /PASSED|FAILED|ERROR|=====/.test(l))
                .join('\n');
              return { passed, failed, errors, lines };
            }

            const unit        = parseOutput('unit_output.txt');
            const e2e         = parseOutput('e2e_output.txt');
            const integration = parseOutput('integration_output.txt');

            const unitOk  = unit.failed === 0 && unit.errors === 0;
            const e2eOk   = e2e.failed === 0 && e2e.errors === 0;
            const intOk   = integration.failed === 0 && integration.errors === 0;
            const allGreen = unitOk && e2eOk; // integración no bloquea merge (depende de red)

            const totalPassed = unit.passed + e2e.passed + integration.passed;
            const totalFailed = unit.failed + e2e.failed + integration.failed;

            const header  = allGreen
              ? '## ✅ Tests pasando — apto para merge'
              : '## ❌ Tests fallando — NO mergear';

            const verdict = allGreen
              ? '> **Todos los tests han pasado.** Esta PR es segura para hacer merge a `main`.'
              : '> **Hay tests fallando.** Revisar los errores antes de mergear a `main`.';

            const icon = (ok) => ok ? '✅' : '❌';

            const body = [
              header, '',
              verdict, '',
              `| Suite | Passed | Failed | Estado |`,
              `|---|---|---|---|`,
              `| 🔬 Unit        | ${unit.passed}        | ${unit.failed}        | ${icon(unitOk)}  |`,
              `| 🌐 E2E         | ${e2e.passed}         | ${e2e.failed}         | ${icon(e2eOk)}   |`,
              `| 🔗 Integration | ${integration.passed} | ${integration.failed} | ${icon(intOk)} _(informativo)_ |`,
              `| **Total**      | **${totalPassed}**    | **${totalFailed}**    | ${icon(allGreen)} |`,
              '',
              '<details>',
              '<summary>🔬 Unit tests — detalle</summary>',
              '', '```', unit.lines, '```', '',
              '</details>',
              '',
              '<details>',
              '<summary>🌐 E2E tests — detalle</summary>',
              '', '```', e2e.lines, '```', '',
              '</details>',
              '',
              '<details>',
              '<summary>🔗 Integration tests — detalle</summary>',
              '', '```', integration.lines, '```', '',
              '</details>',
              '',
              `---`,
              `*Ejecutado por [PR Tests](../../actions/runs/${context.runId}) · commit \`${context.sha.slice(0,7)}\`*`,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            for (const c of comments) {
              if (c.user.type === 'Bot' && (c.body.includes('Tests pasando') || c.body.includes('Tests fallando'))) {
                await github.rest.issues.deleteComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: c.id,
                });
              }
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
